<!DOCTYPE html>
<html lang="en">
<head>
<title>CSS</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    .div1 {width: 200px; height: 200px; background-color: #d1ecff; border: 3px dashed #000; padding: 5px; margin: 10px;}
    .div2 {width: 100px; height: 100px; background-color: #fff; border: 3px ridge #000; padding: 5px; margin: 10px;}
</style>
</head>
<body>
 <div class="div1">
    This is the first box.
 
 <div class="div2">
    This is the second box.
 </div>
</div>
</body>
</html>
